<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현채 짱 — Premium Workspace</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="scroll-progress-bar" id="scroll-progress"></div>

    <div class="container">
        <header class="brand-header hero-reveal">
            <div class="brand-title-box">
                <h1 class="brand-title">현채 짱</h1>
            </div>
            
            <div class="nodes-counter-box">
                <div class="counter-inner">
                    <span class="bracket">{</span>
                    <span id="node-count" class="count-number">0</span>
                    <span class="bracket">}</span>
                </div>
                <span class="count-label">TOTAL NODES</span>
            </div>
        </header>

        <hr class="section-divider hero-reveal delay-1">

        <section class="navigation-zone hero-reveal delay-2">
            <div class="month-title-wrap">
                <span class="title-indicator"></span>
                <h2 class="month-main-title">1. MONTH</h2>
            </div>
            
            <div class="filter-engine">
                <div class="filter-bg-slider" id="filter-slider"></div>
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="march">MARCH</button>
                <button class="filter-btn" data-filter="april">APRIL</button>
                <button class="filter-btn" data-filter="may">MAY</button>
            </div>
        </section>

        <main id="project-container" class="project-container">
            </main>
        <footer class="site-footer">
            <hr class="footer-divider">
            <div class="footer-content">
                <span class="footer-copyright">2026 차현채</span>
            </div>
        </footer>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
