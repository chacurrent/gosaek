<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>display 프로퍼티</title>

<style>
    div {
        border: 2px solid hotpink;
        color: magenta;
        background-color: violet;
    }
    
    span {
        border: 3px dotted black;
        background: brown;
    }
</style>


</head>

    <body>
		<a href="../index.html" style="display:inline-block; margin: 20px; padding: 10px 20px; background:#111; color:#00ff66; text-decoration:none; border:1px solid #333; border-radius:5px; font-family:'Roboto Mono';">
			← 홈으로 돌아가기 (cd ../)
		</a>

        <h3>인라인, 인라인 블록, 블록</h3>

        <hr>

        나는 <div style="display:none">

                div(none)</div>입니다.<br><br>

        나는 <div style="display:inline">

                div(inline)</div> 입니다.<br><br>

        나는 <div style="display:inline-block; height:50px">

                div(inline-block)</div> 입니다.<br><br>

        나는 <div>div<span style="display:block">

                span(block)</span> 입니다.

            </div>

    </body>

</html>
