<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <script>
                function printStar(star) {
                    for(let i = 1; i <= star; i++) {
                        for(let j = 1; j <= i; j++) document.write("*");
                        document.write("<br>")
                    }
                }
        </script>

    </head>
        <body>
			<a href="../index.html" style="display:inline-block; margin: 20px; padding: 10px 20px; background:#111; color:#FFFFFF; text-decoration:none; border:1px solid #333; border-radius:5px; font-family:'Roboto Mono';">
				← 메인으로 돌아가기
			</a>
            <script>
                let N = prompt("1 + 1 = ?", 5);
                // document.write(N);
                if ( N % 1 != 0.) {
                    document.write("입력 오류입니다.");
                }
                else if(N > 0) {
                    N = parseInt(N);
                    printStar(N);
                }
                else {document.write("입력 오류입니다.")}

            </script>
        </body>
  
</html>
