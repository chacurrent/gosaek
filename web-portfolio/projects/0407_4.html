<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>z-index 프로퍼티</title>

<style>
    div {
        position: absolute;

    }

    img {
        position:absolute;
    }

    #spadeA {
        z-index: -3; left: 10px; top: 20px;
    }

    #spade2 {
        z-index: -2; left: 40px; top: 30px;
    }

    #spade3 {
        z-index: -1; left: 80px; top: 40px;
    }

    #spade7 {
        z-index: 0; left: 120px; top: 50px;
    }
</style>


</head>

<body>
	<a href="../index.html" style="display:inline-block; margin: 20px; padding: 10px 20px; background:#111; color:#FFFFFF; text-decoration:none; border:1px solid #333; border-radius:5px; font-family:'Roboto Mono';">
        ← 메인으로 돌아가기
    </a>

<h3>z-index 프로퍼티</h3>

<hr>

<div>

	<img id="spadeA" src="../images/spade_A.png"

		width="100" height="140" alt="스페이드A">

	<img id="spade2" src="../images/spade_2.png"

		width="100" height="140" alt="스페이드2">

	<img id="spade3" src="../images/spade_3.png"

		width="100" height="140" alt="스페이드3">

	<img id="spade7" src="../images/spade_7.png"

		width="100" height="140" alt="스페이드7">

</div>

</body>

</html>
